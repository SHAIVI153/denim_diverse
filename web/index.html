<!DOCTYPE html>
<html lang="en">
<head>
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">

    <!-- SEO -->
    <meta name="description" content="DenimDiverse — Premium denim jeans for Men, Women & Kids. Shop boot cut, baggy, skinny, straight leg and more. Beyond the standard blue.">
    <meta name="keywords" content="denim, jeans, premium jeans, men jeans, women jeans, kids jeans, boot cut, baggy jeans, skinny jeans, Pakistan">
    <meta name="author" content="DenimDiverse">
    <meta name="theme-color" content="#0A192F">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://denimdiv.pk/">
    <meta property="og:title" content="DenimDiverse — Beyond the Standard Blue">
    <meta property="og:description" content="Premium denim crafted for those who dare to stand apart. Shop Men, Women & Kids collections.">
    <meta property="og:image" content="icons/Icon-512.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DenimDiverse — Beyond the Standard Blue">
    <meta name="twitter:description" content="Premium denim. Shop now at DenimDiverse.">

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DenimDiverse">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">

    <title>DenimDiverse — Beyond the Standard Blue</title>

    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        html, body {
          height: 100%;
          width: 100%;
          overflow: hidden;
          background-color: #0A192F;
        }

        /* ── Splash Screen ── */
        #splash {
          position: fixed;
          inset: 0;
          background: #0A192F;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        #splash.hidden {
          opacity: 0;
          visibility: hidden;
        }

        .splash-logo {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          font-size: 32px;
          font-weight: 900;
          color: #ffffff;
          letter-spacing: -1px;
          animation: fadeUp 0.8s ease forwards;
        }

        .splash-tagline {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          font-size: 9px;
          font-weight: 700;
          color: #D4A853;
          letter-spacing: 3px;
          margin-top: 8px;
          animation: fadeUp 0.8s 0.2s ease both;
        }

        .splash-loader {
          margin-top: 48px;
          width: 36px;
          height: 2px;
          background: rgba(255,255,255,0.1);
          border-radius: 2px;
          overflow: hidden;
          animation: fadeUp 0.8s 0.4s ease both;
        }

        .splash-loader-bar {
          height: 100%;
          background: #D4A853;
          border-radius: 2px;
          animation: load 1.8s ease forwards;
        }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(16px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes load {
          from { width: 0%; }
          to   { width: 100%; }
        }

        /* Flutter canvas */
        flt-glass-pane {
          height: 100% !important;
        }
    </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
    <div class="splash-logo">DenimDiverse.</div>
    <div class="splash-tagline">BEYOND THE STANDARD BLUE</div>
    <div class="splash-loader">
        <div class="splash-loader-bar"></div>
    </div>
</div>

<script>
    // Hide splash after Flutter is ready
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() { splash.remove(); }, 700);
      }
    });
</script>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
